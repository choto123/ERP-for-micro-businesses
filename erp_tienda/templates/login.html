<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Tienda — Iniciar sesión</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { background: var(--color-bg, #f5f4f0); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #fff; border: 0.5px solid var(--color-border, #e2e0d8); border-radius: 16px; padding: 36px 32px; width: 360px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    .login-logo { font-size: 36px; text-align: center; margin-bottom: 6px; }
    .login-title { font-size: 20px; font-weight: 500; text-align: center; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: #888; text-align: center; margin-bottom: 24px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: #666; margin-bottom: 4px; }
    .field input { width: 100%; padding: 9px 12px; border: 0.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
    .field input:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55,138,221,0.15); }
    .btn-login { width: 100%; padding: 10px; background: #378ADD; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 6px; font-family: inherit; }
    .btn-login:hover { background: #185FA5; }
    .error-msg { background: #FCEBEB; color: #A32D2D; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; border: 0.5px solid #F7C1C1; }
    .roles-hint { margin-top: 20px; border-top: 0.5px solid #eee; padding-top: 16px; }
    .roles-hint p { font-size: 11px; color: #aaa; text-align: center; margin-bottom: 8px; }
    .role-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; padding: 3px 0; }
    .role-row span:last-child { color: #bbb; font-family: monospace; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">🏪</div>
  <div class="login-title">ERP Tienda Familiar</div>
  <div class="login-sub">Ingresa tus credenciales para continuar</div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('login') }}">
    <div class="field">
      <label>Usuario</label>
      <input type="text" name="username" placeholder="tu usuario" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Iniciar sesión</button>
  </form>

  <div class="roles-hint">
    <p>Usuarios de prueba</p>
    <div class="role-row"><span>👑 Administrador</span><span>admin / admin123</span></div>
    <div class="role-row"><span>👁 Solo lectura</span><span>vendedor / vendedor123</span></div>
    <div class="role-row"><span>🔒 Bloqueado</span><span>bloqueado / bloqueado123</span></div>
  </div>
  
</div>
</body>
</html>
